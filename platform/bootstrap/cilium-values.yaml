---
# Cilium values for kind on Mac mini M4 (16 GB).
# Install with:
#   helm install cilium cilium/cilium --version 1.16.5 \
#     --namespace kube-system --values platform/bootstrap/cilium-values.yaml
# Pinned version belongs in scripts/bootstrap.sh too — keep them in sync.

# kube-proxy replacement is the headline reason to use Cilium here. Required
# because we set kubeProxyMode: none in kind-cluster.yaml.
kubeProxyReplacement: true
k8sServiceHost: kind-control-plane
k8sServicePort: 6443

# Image pull policy and tag pinning.
image:
  pullPolicy: IfNotPresent

operator:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

# Cilium agent runs on every node. Keep requests honest for a 16 GB host.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

# IPAM: cluster-pool is the kind-friendly default.
ipam:
  mode: cluster-pool
  operator:
    clusterPoolIPv4PodCIDRList:
      - "10.244.0.0/16"
    clusterPoolIPv4MaskSize: 24

# Hubble — observability for the dataplane. Enabled because seeing flows is half
# the value of running Cilium in a lab. UI is opt-in via port-forward.
hubble:
  enabled: true
  relay:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
  ui:
    enabled: true
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi
  metrics:
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - icmp
      - http

# Disable features we don't need on a lab to keep memory down.
bgpControlPlane:
  enabled: false
clustermesh:
  useAPIServer: false

# L7 proxy via Envoy — leave default (in-agent). Switching to standalone DaemonSet
# adds a process per node; we don't need the isolation here.
envoy:
  enabled: false

# Tunneling: vxlan is the simplest path on kind. Native routing requires more
# host-network plumbing than is worth it here.
routingMode: tunnel
tunnelProtocol: vxlan
