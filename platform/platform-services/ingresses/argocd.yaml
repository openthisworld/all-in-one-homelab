---
# ArgoCD UI — GitOps dashboard.
# Access: http://argocd.homelab.local
#
# Requires ArgoCD server to run in insecure mode (HTTP, no internal redirect).
# This is set in argocd-cmd-params-cm: server.insecure=true.
# See bootstrap/README.md Step 5 for the kubectl patch command.
#
# NOTE: HTTP only — acceptable for a local lab behind loopback.
# When cert-manager + a self-signed CA are set up, add TLS here.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd
  namespace: argocd
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: argocd.homelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
