---
# ArgoCD UI — GitOps dashboard.
# Access: http://argocd.homelab.local
#
# Ingress is managed here (alongside other platform services) rather than
# inside the ArgoCD Helm chart values, for consistency with the rest of the stack.
# server.ingress.enabled is set to false in platform-services/argocd/values.yaml.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd
  namespace: argocd
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: argocd.homelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
