---
# Dex OIDC provider — GitHub OAuth upstream, serves ArgoCD and Vault.
#
# Secrets are injected via envFrom (ExternalSecret dex-secrets):
#   GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET → GitHub OAuth App
#   ARGOCD_CLIENT_SECRET                   → ArgoCD OIDC client_secret (plaintext)
#   VAULT_CLIENT_SECRET                    → Vault OIDC client_secret (plaintext)
#
# Static clients (ArgoCD, Vault) use Dex's `secretEnv` field — Dex resolves
# the env var at startup. Plaintext lives only in Vault and the in-cluster
# Secret synced by ESO; nothing sensitive is committed to git.
#
# Why not OAuth2Client CRDs:
#   The CRD storage backend uses a flat schema (id/secret/redirectURIs at
#   resource root) and stores plaintext secrets — meaning either the secret
#   leaks into git or a separate sync mechanism is needed. `secretEnv` keeps
#   the wiring in one file with no extra moving parts. See ADR-0009.

config:
  issuer: http://dex.homelab.local

  storage:
    # Kubernetes CRD storage — Dex manages its own state CRDs (auth requests,
    # offline sessions, refresh tokens). Static clients live in this config,
    # not in storage.
    type: kubernetes
    config:
      inCluster: true

  web:
    http: 0.0.0.0:5556

  connectors:
    - type: github
      id: github
      name: GitHub
      config:
        # $VAR expansion works in connector config (Dex feature, not generic).
        clientID: $GITHUB_CLIENT_ID
        clientSecret: $GITHUB_CLIENT_SECRET
        redirectURI: http://dex.homelab.local/callback
        orgs: []

  staticClients:
    - id: argocd
      name: ArgoCD
      # Dex reads the literal env var named here at startup. Not $VAR
      # interpolation — a dedicated field that bypasses YAML parsing.
      secretEnv: ARGOCD_CLIENT_SECRET
      redirectURIs:
        - http://argocd.homelab.local/auth/callback
        - https://argocd.homelab.local/auth/callback

    - id: vault
      name: Vault
      secretEnv: VAULT_CLIENT_SECRET
      redirectURIs:
        - http://vault.homelab.local/ui/vault/auth/oidc/oidc/callback
        - http://localhost:8250/oidc/callback

  oauth2:
    skipApprovalScreen: true
    responseTypes:
      - code

# Mount the dex-secrets k8s Secret as environment variables.
# ExternalSecret (in external-secrets/manifests/) syncs this from Vault.
envFrom:
  - secretRef:
      name: dex-secrets

resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    memory: 128Mi

# Dex needs to manage its own state CRDs (auth requests, refresh tokens, etc).
serviceAccount:
  create: true

rbac:
  create: true
