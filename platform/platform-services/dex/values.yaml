---
# Dex OIDC provider — GitHub OAuth upstream, serves ArgoCD and Vault.
#
# Secrets are injected via envFrom (ExternalSecret dex-secrets):
#   GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET → GitHub OAuth App
#
# OIDC clients (ArgoCD, Vault) are managed as oauth2clients.dex.coreos.com CRD
# objects in platform/platform-services/dex/manifests/ — not as staticClients here.
# Reason: Dex v2.41.1 does not expand $VAR env vars in the staticClients config
# section. CRD objects bypass the config entirely and are read directly from
# Dex's kubernetes storage backend.

config:
  issuer: http://dex.homelab.local

  storage:
    # Kubernetes CRD storage — no external DB needed. Dex manages its own CRDs.
    type: kubernetes
    config:
      inCluster: true

  web:
    http: 0.0.0.0:5556

  connectors:
    - type: github
      id: github
      name: GitHub
      config:
        # Injected from dex-secrets ExternalSecret via env vars.
        # Dex DOES expand $VAR in the connectors section.
        clientID: $GITHUB_CLIENT_ID
        clientSecret: $GITHUB_CLIENT_SECRET
        redirectURI: http://dex.homelab.local/callback
        orgs: []

  oauth2:
    skipApprovalScreen: true
    responseTypes:
      - code

# Mount the dex-secrets k8s Secret as environment variables.
# ExternalSecret (in external-secrets/manifests/) syncs this from Vault.
envFrom:
  - secretRef:
      name: dex-secrets

resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    memory: 128Mi

# Dex needs to create/manage its own CRDs for storage.
serviceAccount:
  create: true

# RBAC to allow Dex to manage its storage CRDs.
rbac:
  create: true
