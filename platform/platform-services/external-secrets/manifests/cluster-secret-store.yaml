---
# ClusterSecretStore — tells ESO how to reach Vault.
# Apply AFTER running `just vault-setup`. See platform/platform-services/vault/OPERATIONS.md
#
# This is a cluster-scoped resource: ExternalSecrets in any namespace can
# reference it with: secretStoreRef.kind: ClusterSecretStore, name: vault
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-role"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
