---
# ExternalSecret: dex-secrets (namespace: dex)
# Syncs GitHub OAuth creds + ArgoCD OIDC client secret from Vault → k8s Secret.
# Dex pod reads these via envFrom (see platform-services/dex/values.yaml).
#
# Required Vault secrets — populate with: just vault-seed
#   secret/homelab/platform/dex/github  → client_id, client_secret (GitHub OAuth App)
#   secret/homelab/platform/dex/argocd  → client_secret
#   secret/homelab/platform/dex/vault   → client_secret
#
# GitHub OAuth App: Settings → Developer settings → OAuth Apps → New OAuth App
#   Homepage URL:      http://dex.homelab.local
#   Callback URL:      http://dex.homelab.local/callback
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dex-secrets
  namespace: dex
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: dex-secrets
    creationPolicy: Owner
  data:
    - secretKey: GITHUB_CLIENT_ID
      remoteRef:
        key: secret/homelab/platform/dex/github
        property: client_id
    - secretKey: GITHUB_CLIENT_SECRET
      remoteRef:
        key: secret/homelab/platform/dex/github
        property: client_secret
    - secretKey: ARGOCD_CLIENT_SECRET
      remoteRef:
        key: secret/homelab/platform/dex/argocd
        property: client_secret
    - secretKey: VAULT_CLIENT_SECRET
      remoteRef:
        key: secret/homelab/platform/dex/vault
        property: client_secret
