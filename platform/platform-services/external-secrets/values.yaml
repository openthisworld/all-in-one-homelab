---
# External Secrets Operator values for homelab.
# Minimal footprint — single replica, no webhook cert rotation needed for lab.

replicaCount: 1

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    memory: 128Mi

webhook:
  replicaCount: 1
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

certController:
  replicaCount: 1
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

# ServiceMonitor for VictoriaMetrics scraping (enable when observability is up).
serviceMonitor:
  enabled: false
