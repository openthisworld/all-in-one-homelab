---
# cert-manager — installs CRDs as part of the Helm release.
# Changing crds.enabled to false requires manual CRD management.
crds:
  enabled: true

replicaCount: 1

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 128Mi

webhook:
  replicaCount: 1
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

cainjector:
  replicaCount: 1
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi

startupapicheck:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi
