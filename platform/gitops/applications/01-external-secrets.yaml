---
# External Secrets Operator — syncs secrets from Vault into k8s Secrets.
# See docs/adr/0006-secrets-management-vault.md for rationale.
#
# After Vault is initialized and unsealed, run: just vault-setup
# This configures the Vault kubernetes auth method and ESO policy.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 0.10.3
      helm:
        releaseName: external-secrets
        valueFiles:
          - $values/platform/platform-services/external-secrets/values.yaml
    - repoURL: https://github.com/openthisworld/all-in-one-homelab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
