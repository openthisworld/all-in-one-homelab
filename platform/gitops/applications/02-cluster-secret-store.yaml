---
# ClusterSecretStore for Vault — applied automatically by ArgoCD.
# This will show "SecretStore validation failed" until vault-setup is run,
# then ESO retries and it becomes Healthy automatically. No manual apply needed.
#
# Depends on:
#   - Vault pod Running + unsealed (just vault-unseal)
#   - Vault kubernetes auth configured (just vault-setup)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-secret-store
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/openthisworld/all-in-one-homelab.git
    targetRevision: main
    path: platform/platform-services/external-secrets/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
